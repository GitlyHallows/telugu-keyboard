name: Feature request
description: Suggest an improvement to Telugu Keyboard
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
      placeholder: "Example: It is hard to discover how to clear learned words."
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: Desired behavior
      description: Describe the behavior in plain language.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Add examples, screenshots, or similar apps if helpful.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions for duplicates.
          required: true
