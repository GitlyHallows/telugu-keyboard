<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Telugu Keyboard typing demo</title>
  <desc id="desc">A macOS-style Telugu Keyboard demo converting Roman Telugu into Telugu script.</desc>
  <rect width="1200" height="420" rx="28" fill="#111827"/>
  <rect x="36" y="36" width="1128" height="348" rx="20" fill="#F8FAFC"/>
  <text x="78" y="105" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#111827">Telugu Keyboard</text>
  <text x="78" y="155" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" fill="#475569">Type Roman Telugu. Write Telugu script. Stay offline.</text>
  <rect x="78" y="205" width="455" height="106" rx="14" fill="#E2E8F0"/>
  <text x="106" y="270" font-family="Menlo, SFMono-Regular, Consolas, monospace" font-size="34" fill="#0F172A">em chestunnav</text>
  <path d="M570 258H690" stroke="#0F766E" stroke-width="10" stroke-linecap="round"/>
  <path d="M658 226L692 258L658 290" stroke="#0F766E" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="728" y="205" width="394" height="106" rx="14" fill="#CCFBF1"/>
  <text x="756" y="272" font-family="-apple-system, BlinkMacSystemFont, Noto Sans Telugu, Gautami, sans-serif" font-size="42" font-weight="700" fill="#0F172A">ఏం చేస్తున్నావ్</text>
  <circle cx="1048" cy="104" r="34" fill="#0F766E"/>
  <path d="M1032 104L1043 115L1065 91" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
